name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'yarn'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - run: corepack enable && yarn install --immutable
      - run: yarn contentlayer2 build
      - run: yarn tsc --noEmit

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /opt/jimmy-blog
            git pull origin main
            docker build -t jimmy-blog:latest .
            docker stop jimmy-blog 2>/dev/null || true
            docker rm jimmy-blog 2>/dev/null || true
            docker run -d \
              --name jimmy-blog \
              --restart unless-stopped \
              --network nginx-ui_default \
              -e IINA_TOKEN=${{ secrets.IINA_TOKEN }} \
              -e IINA_USER_ID=${{ secrets.IINA_USER_ID }} \
              -e GH_TOKEN=${{ secrets.GH_TOKEN }} \
              -e GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }} \
              -e GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }} \
              -e NEXT_UMAMI_ID=${{ secrets.NEXT_UMAMI_ID }} \
              jimmy-blog:latest
            docker image prune -f
