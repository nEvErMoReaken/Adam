name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/jimmy-blog:latest

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE=${IMAGE,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Lowercase image name
        run: echo "IMAGE=${IMAGE,,}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: "10m"
          script: |
            set -e
            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.IMAGE }}
            docker stop jimmy-blog 2>/dev/null || true
            docker rm jimmy-blog 2>/dev/null || true
            docker run -d \
              --name jimmy-blog \
              --restart unless-stopped \
              --network nginx-ui_default \
              -e IINA_TOKEN=${{ secrets.IINA_TOKEN }} \
              -e IINA_USER_ID=${{ secrets.IINA_USER_ID }} \
              -e GH_TOKEN=${{ secrets.GH_TOKEN }} \
              -e GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }} \
              -e GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }} \
              -e UMAMI_USER=${{ secrets.UMAMI_USER }} \
              -e UMAMI_PASS=${{ secrets.UMAMI_PASS }} \
              -e NEXT_UMAMI_ID=${{ secrets.NEXT_UMAMI_ID }} \
              ${{ env.IMAGE }}
            docker image prune -f
