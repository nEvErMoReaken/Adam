name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: "30m"
          script: |
            set -e
            cd /opt/jimmy-blog
            git pull origin main
            docker build -t jimmy-blog:latest .
            docker stop jimmy-blog 2>/dev/null || true
            docker rm jimmy-blog 2>/dev/null || true
            docker run -d \
              --name jimmy-blog \
              --restart unless-stopped \
              --network nginx-ui_default \
              -e IINA_TOKEN=${{ secrets.IINA_TOKEN }} \
              -e IINA_USER_ID=${{ secrets.IINA_USER_ID }} \
              -e GH_TOKEN=${{ secrets.GH_TOKEN }} \
              -e GH_CLIENT_ID=${{ secrets.GH_CLIENT_ID }} \
              -e GH_CLIENT_SECRET=${{ secrets.GH_CLIENT_SECRET }} \
              -e UMAMI_USER=${{ secrets.UMAMI_USER }} \
              -e UMAMI_PASS=${{ secrets.UMAMI_PASS }} \
              -e NEXT_UMAMI_ID=${{ secrets.NEXT_UMAMI_ID }} \
              jimmy-blog:latest
            docker image prune -f
            docker builder prune --keep-storage 2gb -f
